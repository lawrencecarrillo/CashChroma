<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ca$hChroma</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">Ca$h<span>Chroma</span></div>
    <div class="header-right">
      <div class="balance" id="balance">$0.00</div>
      <button class="calc-toggle" onclick="toggleCalc()" title="Calculator">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="16" height="16" rx="3" stroke="#FFD700" stroke-width="1.5"/>
          <rect x="5" y="5" width="10" height="3" rx="1" fill="#FFD700"/>
          <circle cx="5.5" cy="12" r="1" fill="#FFD700"/>
          <circle cx="10" cy="12" r="1" fill="#FFD700"/>
          <circle cx="14.5" cy="12" r="1" fill="#FFD700"/>
          <circle cx="5.5" cy="15.5" r="1" fill="#FFD700"/>
          <circle cx="10" cy="15.5" r="1" fill="#FFD700"/>
          <circle cx="14.5" cy="15.5" r="1" fill="#FFD700"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Calculator (collapsible) -->
  <div class="calc-panel" id="calc-panel">
    <div class="calc-display" id="calc-display">0</div>
    <div class="calc-grid">
      <button class="calc-btn wide red"  onclick="calcClear()">C</button>
      <button class="calc-btn"           onclick="calcSign()">+/−</button>
      <button class="calc-btn op"        onclick="calcOp('÷')">÷</button>

      <button class="calc-btn"           onclick="calcNum('7')">7</button>
      <button class="calc-btn"           onclick="calcNum('8')">8</button>
      <button class="calc-btn"           onclick="calcNum('9')">9</button>
      <button class="calc-btn op"        onclick="calcOp('×')">×</button>

      <button class="calc-btn"           onclick="calcNum('4')">4</button>
      <button class="calc-btn"           onclick="calcNum('5')">5</button>
      <button class="calc-btn"           onclick="calcNum('6')">6</button>
      <button class="calc-btn op"        onclick="calcOp('−')">−</button>

      <button class="calc-btn"           onclick="calcNum('1')">1</button>
      <button class="calc-btn"           onclick="calcNum('2')">2</button>
      <button class="calc-btn"           onclick="calcNum('3')">3</button>
      <button class="calc-btn op"        onclick="calcOp('+')">+</button>

      <button class="calc-btn wide"      onclick="calcNum('0')">0</button>
      <button class="calc-btn"           onclick="calcDot()">.</button>
      <button class="calc-btn gold"      onclick="calcEquals()">=</button>
    </div>
  </div>

  <!-- Add Entry Form -->
  <div class="form-card">
    <div class="type-btns">
      <button class="type-btn active-income" onclick="selectType('income', this)">🟢 Income</button>
      <button class="type-btn" onclick="selectType('bill-due', this)">🔴 Bill Due</button>
      <button class="type-btn" onclick="selectType('bill-paid', this)">🔵 Paid</button>
      <button class="type-btn" onclick="selectType('upcoming', this)">🟡 Upcoming</button>
      <button class="type-btn" onclick="selectType('savings', this)">🟣 Savings</button>
    </div>
    <input type="text" id="entry-label" placeholder="Label e.g. Rent, Paycheck…" />
    <input type="number" id="entry-amount" placeholder="Amount e.g. 1500" inputmode="decimal" min="0" step="0.01" />
    <input type="date" id="entry-date" />
    <button class="add-btn income" id="add-btn" onclick="addEntry()">+ Add</button>
  </div>

  <!-- Entry List -->
  <div class="entry-list" id="entry-list">
    <div class="empty">No entries yet. Add one above.</div>
  </div>

<script>
  let entries = JSON.parse(localStorage.getItem('cc-entries') || '[]');
  let currentType = 'income';

  const today = new Date();
  today.setHours(0,0,0,0);
  document.getElementById('entry-date').value = fmtDate(today);
  renderAll();

  /* ── Calculator ── */
  let calcVal = '0', calcPrev = null, calcOper = null, calcReset = false;

  function toggleCalc() { document.getElementById('calc-panel').classList.toggle('open'); }

  function calcDisplay() {
    const el = document.getElementById('calc-display');
    el.textContent = calcVal.length > 10 ? parseFloat(calcVal).toPrecision(8) : calcVal;
  }
  function calcNum(n) {
    if (calcReset) { calcVal = n; calcReset = false; }
    else calcVal = calcVal === '0' ? n : calcVal + n;
    calcDisplay();
  }
  function calcDot() {
    if (calcReset) { calcVal = '0.'; calcReset = false; calcDisplay(); return; }
    if (!calcVal.includes('.')) { calcVal += '.'; calcDisplay(); }
  }
  function calcSign() { calcVal = String(parseFloat(calcVal) * -1); calcDisplay(); }
  function calcOp(op) {
    if (calcPrev !== null && !calcReset) calcEquals(true);
    calcPrev = parseFloat(calcVal); calcOper = op; calcReset = true;
  }
  function calcEquals(chain = false) {
    if (calcPrev === null || calcOper === null) return;
    const cur = parseFloat(calcVal);
    let result;
    if (calcOper === '+') result = calcPrev + cur;
    if (calcOper === '−') result = calcPrev - cur;
    if (calcOper === '×') result = calcPrev * cur;
    if (calcOper === '÷') result = cur === 0 ? 'Error' : calcPrev / cur;
    calcVal = String(result);
    if (!chain) { calcPrev = null; calcOper = null; }
    calcReset = !chain;
    calcDisplay();
  }
  function calcClear() { calcVal = '0'; calcPrev = null; calcOper = null; calcReset = false; calcDisplay(); }

  /* ── App ── */
  function renderAll() { renderBalance(); renderList(); }

  function renderBalance() {
    let earned = 0, spent = 0;
    entries.forEach(e => {
      const d = parseDate(e.date);
      if (e.type === 'income' && d <= today)    earned += e.amount;
      if (e.type === 'bill-paid' && d <= today) spent  += e.amount;
      if (e.type === 'bill-due' && d <= today)  spent  += e.amount;
      if (e.type === 'savings' && d <= today)   spent  += e.amount;
    });
    const balance = earned - spent;
    const el = document.getElementById('balance');
    el.textContent = fmt(balance);
    el.className = 'balance ' + (balance < 0 ? 'negative' : 'positive');
  }

  function renderList() {
    const list = document.getElementById('entry-list');
    if (!entries.length) { list.innerHTML = '<div class="empty">No entries yet. Add one above.</div>'; return; }
    const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
    list.innerHTML = '';
    sorted.forEach(e => {
      const row = document.createElement('div');
      row.className = `entry-row ${e.type}`;
      row.innerHTML = `
        <div class="entry-dot ${e.type}"></div>
        <div class="entry-info">
          <div class="entry-label">${e.label}</div>
          <div class="entry-date">${fmtDisplay(e.date)}</div>
        </div>
        <div class="entry-amount ${e.type}">${e.type === 'income' ? '+' : '-'}${fmt(e.amount)}</div>
        <button class="del-btn" onclick="deleteEntry('${e.id}')">×</button>
      `;
      list.appendChild(row);
    });
  }

  function addEntry() {
    const label  = document.getElementById('entry-label').value.trim();
    const amount = parseFloat(document.getElementById('entry-amount').value);
    const date   = document.getElementById('entry-date').value;
    if (!label)              { flash('entry-label');  return; }
    if (!amount || amount<=0){ flash('entry-amount'); return; }
    if (!date)               { flash('entry-date');   return; }
    entries.push({ id: Date.now().toString(), type: currentType, label, amount, date });
    save(); renderAll();
    document.getElementById('entry-label').value  = '';
    document.getElementById('entry-amount').value = '';
  }

  function deleteEntry(id) { entries = entries.filter(e => e.id !== id); save(); renderAll(); }

  function selectType(type, btn) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
    btn.classList.add(`active-${type}`);
    document.getElementById('add-btn').className = `add-btn ${type}`;
  }

  function save() { localStorage.setItem('cc-entries', JSON.stringify(entries)); }
  function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function fmtDisplay(str) {
    const [y, m, d] = str.split('-').map(Number);
    return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]} ${d}, ${y}`;
  }
  function parseDate(str) { const [y,m,d]=str.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setHours(0,0,0,0); return dt; }
  function flash(id) {
    const el = document.getElementById(id);
    el.style.borderColor = '#FF2D78';
    setTimeout(() => el.style.borderColor = '', 1500);
  }
</script>
</body>
</html>
